<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Franco</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080b10;
      --surface: #0e1420;
      --border: #1a2236;
      --accent: #4af0c0;
      --accent2: #2563eb;
      --text: #e8edf5;
      --muted: #4a5568;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;
    }

    /* Custom cursor */
    .cursor {
      width: 12px; height: 12px;
      background: var(--accent);
      border-radius: 50%;
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s, background 0.2s;
      mix-blend-mode: screen;
    }
    .cursor-ring {
      width: 36px; height: 36px;
      border: 1px solid var(--accent);
      border-radius: 50%;
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: all 0.18s ease;
      opacity: 0.5;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(74,240,192,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(74,240,192,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow blob */
    .blob {
      position: fixed;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(37,99,235,0.12) 0%, transparent 70%);
      border-radius: 50%;
      top: -100px; right: -150px;
      pointer-events: none;
      z-index: 0;
      animation: blobFloat 8s ease-in-out infinite;
    }
    .blob2 {
      position: fixed;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(74,240,192,0.07) 0%, transparent 70%);
      border-radius: 50%;
      bottom: -100px; left: -100px;
      pointer-events: none;
      z-index: 0;
      animation: blobFloat 11s ease-in-out infinite reverse;
    }
    @keyframes blobFloat {
      0%, 100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(30px, 40px) scale(1.05); }
    }

    /* Layout */
    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      max-width: 680px;
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(14,20,32,0.7);
      backdrop-filter: blur(20px);
      border-radius: 2px;
      padding: 3.5rem;
      position: relative;
      animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Corner accents */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      border-color: var(--accent);
      border-style: solid;
    }
    .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    /* Tag line */
    .tag {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      animation: cardIn 0.8s 0.1s cubic-bezier(0.16,1,0.3,1) both;
    }
    .tag::before {
      content: '';
      display: inline-block;
      width: 24px; height: 1px;
      background: var(--accent);
    }

    /* Name */
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
      animation: cardIn 0.8s 0.15s cubic-bezier(0.16,1,0.3,1) both;
    }
    h1 span {
      display: block;
      background: linear-gradient(135deg, var(--text) 0%, var(--muted) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    h1 .accent-word {
      background: linear-gradient(135deg, var(--accent) 0%, #2dd4bf 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Description */
    .desc {
      font-size: 0.85rem;
      line-height: 1.8;
      color: #8899aa;
      margin-bottom: 2.5rem;
      max-width: 480px;
      animation: cardIn 0.8s 0.25s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* Tags row */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
      animation: cardIn 0.8s 0.3s cubic-bezier(0.16,1,0.3,1) both;
    }
    .chip {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      padding: 0.3rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
      transition: border-color 0.2s, color 0.2s;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }

    /* Divider */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, var(--accent) 0%, transparent 80%);
      margin-bottom: 2rem;
      animation: cardIn 0.8s 0.35s both;
    }

    /* Status indicator */
    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.72rem;
      color: var(--muted);
      animation: cardIn 0.8s 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Footer */
    .footer {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      z-index: 1;
    }

    @media (max-width: 500px) {
      .card { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>
  <div class="blob"></div>
  <div class="blob2"></div>

  <main>
    <div class="card">
      <p class="tag">Bienvenido</p>
      <h1>
        <span>Hola, soy</span>
        <span class="accent-word">Franco.</span>
      </h1>
      <p class="desc">
        Estudiante uruguayo con ganas de comerse el mundo.<br>
        Fan de Nintendo, la tecnología y las ideas que no caben en 280 caracteres.
      </p>
      <div class="tags">
        <span class="chip">Uruguay 🇺🇾</span>
        <span class="chip">Nintendo</span>
        <span class="chip">PC Gaming</span>
        <span class="chip">Contaduría</span>
        <span class="chip">Frente Amplio</span>
      </div>
      <div class="divider"></div>
      <div class="status">
        <span class="dot"></span>
        <span>Online desde Canelones</span>
      </div>
    </div>
  </main>

  <div class="footer">franco123xd.github.io</div>

  <script>
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px';
      cursor.style.top  = my + 'px';
    });

    function animateRing() {
      rx += (mx - rx) * 0.12;
      ry += (my - ry) * 0.12;
      ring.style.left = rx + 'px';
      ring.style.top  = ry + 'px';
      requestAnimationFrame(animateRing);
    }
    animateRing();
  </script>
</body>
</html>
